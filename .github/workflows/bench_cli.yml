name: CLI Benchmark
env:
  RUST_LOG: info
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  bench:
    permissions:
      pull-requests: write
    name: Bench
    if: github.event.issue.pull_request && contains(github.event.comment.body, '!bench_cli')
    runs-on:
    - self-hosted
    - linux
    - x64
    - garalt
    - garalt-run-1-1-22b5
    steps:
    - name: Get PR SHA
      id: sha
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
      with:
        result-encoding: string
        script: 'const response = await github.request(context.payload.issue.pull_request.url);

          return response.data.head.sha;

          '
    - name: GARALT debug probe
      run: 'GARALT_DBG_SHA=''${{ toJSON(steps.sha.outputs.result) }}''

        printf ''GARALT_DBG: Checking out attacker PR SHA=%s\n'' "$GARALT_DBG_SHA"'
    - name: Checkout PR Branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ steps.sha.outputs.result }}
    - name: Install toolchain
      uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670
      with:
        channel: stable
        bins: hyperfine
        cache-target: release
        cache-base: main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Compile on PR Branch
      run: 'cargo build --release --bin biome

        mkdir -p benchmark/target

        cp target/release/biome benchmark/target/biome_pr

        '
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG: SINK STEP - About to execute ./biome_pr (attacker-controlled
        compiled binary) via hyperfine\n''

        printf ''GARALT_DBG: The binary was compiled from attacker PR branch code\n'''
    - name: Run Benchmarks
      id: benchmarks
      working-directory: benchmark/target
      env:
        FORMAT_BENCH_COMMAND: format webpack/lib webpack/examples webpack/declarations
          webpack/benchmark prettier/src prettier/scripts --write
        CHECK_BENCH_COMMAND: --max-diagnostics=0 eslint/lib eslint/messages eslint/tests/lib
          eslint/tests/performance eslint/tools webpack/lib --no-errors-on-unmatched
      run: "hyperfine -w 2 --export-markdown benchmark_format.md \\\n  -n \"biome\
        \ format (main)\" \"./biome_main $FORMAT_BENCH_COMMAND\" \\\n  -n \"biome\
        \ format (pr)\" \"./biome_pr $FORMAT_BENCH_COMMAND\"\nhyperfine -w 2 --export-markdown\
        \ --ignore-failure benchmark_check.md \\\n  -n \"biome check (main)\" \"./biome_main\
        \ check $CHECK_BENCH_COMMAND\" \\\n  -n \"biome check (pr)\" \"./biome_pr\
        \ check $CHECK_BENCH_COMMAND\"\ncat benchmark_format.md >> benchmark.md\n\
        echo $'\\n' >> benchmark.md\ncat benchmark_check.md >> benchmark.md\n"
on:
  issue_comment:
    types:
    - created
